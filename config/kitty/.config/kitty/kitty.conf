# ==============================================================================
# kitty — eriophora / config/kitty
# Couleurs : jamais ici. Incluses depuis le thème actif (règle d'or du repo).
# Source : conf Ubuntu fusionnée (cf vault : Migration Ubuntu → Arch §1/§4).
# ==============================================================================
include ~/.config/themes/current/colors-kitty.conf

# --- Police & affichage ---
font_family        JetBrainsMono Nerd Font
font_size          11.0
linux_display_server auto
background_opacity 0.9          # opaque, sans blur (noir pur suffit à l'OLED)

# --- Fenêtre (tiling géré par Hyprland, pas par kitty) ---
hide_window_decorations yes
enabled_layouts   stack
enable_audio_bell no
confirm_os_window_close 0

# --- Contrôle à distance (requis par theme-set : reload couleurs à chaud) ---
allow_remote_control yes
listen_on unix:@mykitty

# --- Onglets ---
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# --- Défilement historique ---
map ctrl+shift+up        scroll_line_up
map ctrl+shift+down      scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down

# --- Sélection clavier (hints) ---
map ctrl+shift+p>f kitten hints --type path --program -
map ctrl+shift+p>w kitten hints --type word --program -
map ctrl+shift+p>l kitten hints --type line --program -
map ctrl+shift+p>u kitten hints --type url --program -
