# hyprland.conf — arch_setup
# Couleurs : JAMAIS en dur ici → themes/current
source = ~/.config/themes/current/colors-hypr.conf

$mod = SUPER
$term = kitty
$launcher = rofi -show drun

# --- Démarrage ---
exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprsunset
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- Fenêtres (cf vault : Hyprland - Raccourcis) ---
bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 0
bind = $mod, V, togglefloating
bind = $mod SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = , Print, exec, hyprshot -m output -o ~/Pictures

# --- Navigation workspaces 1-5 ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, right, workspace, e+1
bind = $mod, left, workspace, e-1
bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# --- Apps & système ---
bind = $mod, Return, exec, $term
bind = $mod, D, exec, $launcher
bind = $mod, L, exec, hyprlock
bind = $mod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod, B, exec, pkill -SIGUSR1 waybar   # toggle barre (cachée par défaut = OLED)
bind = $mod, E, exec, $term -e yazi

# --- Média / matériel ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# --- Look (épuré ; valeurs à affiner) ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
}
decoration {
    rounding = 6
}
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
