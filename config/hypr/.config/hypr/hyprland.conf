# hyprland.conf — eriophora
# Couleurs : JAMAIS en dur ici → themes/current
# Binds : miroir du vault « Hyprland - Raccourcis »
source = ~/.config/themes/current/colors-hypr.conf

$mod = SUPER
$term = kitty
$launcher = rofi -show drun

# --- Démarrage ---
exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprsunset
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- Fenêtres ---
bind = $mod, W, killactive
bind = $mod, F, fullscreen, 0
bind = $mod, V, togglefloating
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod SHIFT, left,  movewindow, mon:l
bind = $mod SHIFT, right, movewindow, mon:r
bind = $mod SHIFT, up,    movewindow, mon:u
bind = $mod SHIFT, down,  movewindow, mon:d

# --- Workspaces 1-9 ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod, Prior, workspace, e-1   # PgUp : workspace précédent
bind = $mod, Next,  workspace, e+1   # PgDn : workspace suivant

# --- Apps & système ---
bind = $mod, Return, exec, $term
bind = $mod CTRL, Return, exec, kitty --class popup-kitty   # terminal flottant
bind = ALT, Space, exec, $launcher
bind = $mod, Escape, exec, hyprlock                         # verrouiller (Super+L = focus, cf hjkl)
bind = $mod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = , Print, exec, hyprshot -m output -o ~/Pictures
bind = $mod, B, exec, pkill -SIGUSR1 waybar                 # toggle barre (cachée = OLED)
bind = $mod, E, exec, $term -e yazi                         # gestionnaire de fichiers

# --- Média / matériel ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# --- Règles fenêtres ---
windowrulev2 = float,        class:^(popup-kitty)$
windowrulev2 = size 60% 60%, class:^(popup-kitty)$
windowrulev2 = center,       class:^(popup-kitty)$

# --- Look (épuré ; valeurs à affiner) ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
}
decoration {
    rounding = 6
}
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
